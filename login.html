<html lang="es">
<head>

<style>
:root {
  --stone-white:  #F5F2ED;
  --stone-cream:  #EDE8DF;
  --stone-sand:   #C9B99A;
  --stone-ochre:  #A67C52;
  --stone-ochre-dk: #8a6030;
  --stone-warm:   #9C8571;
  --stone-taupe:  #6B5B4E;
  --stone-dark:   #2E2520;
  --stone-black:  #1A1410;
  --stone-grey:   #8A8580;
  --stone-slate:  #4A4540;
  --border:       #E2DDD6;
  --red:          #c04040;
  --green:        #3a8060;
  --font-disp:  'Cormorant Garamond', Georgia, serif;
  --font-mono:  'DM Mono', monospace;
  --font-body:  'Instrument Sans', sans-serif;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--stone-white);
  color: var(--stone-dark);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

/* Grain texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .4;
}

a { color: inherit; text-decoration: none; }

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  padding: 14px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(245,242,237,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

/* ── SPLIT LAYOUT ── */
.login-shell {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* Left panel — brand side */
.login-brand {
  background: var(--stone-black);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 80px 64px;
  position: relative;
  overflow: hidden;
}
.login-brand::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 60% 20%, rgba(166,124,82,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 70% at 10% 90%, rgba(201,185,154,0.08) 0%, transparent 50%);
}
.brand-geo {
  position: absolute;
  top: 60px;
  right: 52px;
  opacity: 0.12;
}
.brand-quote {
  position: relative;
  font-family: var(--font-disp);
  font-size: clamp(28px, 3.5vw, 44px);
  font-weight: 300;
  font-style: italic;
  color: var(--stone-white);
  line-height: 1.2;
  margin-bottom: 24px;
}
.brand-quote em {
  font-style: normal;
  color: var(--stone-sand);
}
.brand-meta {
  position: relative;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--stone-warm);
  border-top: 1px solid rgba(201,185,154,0.2);
  padding-top: 20px;
  display: flex;
  gap: 32px;
}
.brand-meta-item span {
  display: block;
  color: var(--stone-sand);
  margin-top: 3px;
  font-size: 11px;
}

/* Right panel — form side */
.login-form-side {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 72px 80px;
  background: var(--stone-white);
}
.login-card {
  width: 100%;
  max-width: 380px;
}

/* Eyebrow */
.login-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--stone-ochre);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.login-eyebrow::after {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--stone-sand);
}

/* Title */
.login-title {
  font-family: var(--font-disp);
  font-size: clamp(36px, 4vw, 52px);
  font-weight: 300;
  line-height: 1.05;
  color: var(--stone-black);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.login-title em {
  font-style: italic;
  color: var(--stone-ochre);
}

/* Description */
.login-desc {
  font-size: 13px;
  color: var(--stone-grey);
  margin-bottom: 40px;
  line-height: 1.7;
}

/* Form */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.login-field {
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.login-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--stone-warm);
}
.login-input {
  width: 100%;
  padding: 13px 16px;
  font-size: 14px;
  font-family: var(--font-body);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--stone-dark);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.login-input::placeholder { color: var(--stone-sand); }
.login-input:focus {
  border-color: var(--stone-ochre);
  box-shadow: 0 0 0 3px rgba(166,124,82,0.08);
}

/* Feedback */
.login-feedback {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  min-height: 18px;
  margin-top: -4px;
}
.login-feedback.err { color: var(--red); }
.login-feedback.ok  { color: var(--green); }

/* ── THE BUTTON ── */
.login-btn {
  position: relative;
  width: 100%;
  background: var(--stone-black);
  color: var(--stone-white);
  border: none;
  padding: 0;
  cursor: pointer;
  font-family: var(--font-body);
  overflow: hidden;
  margin-top: 6px;
  display: block;
}
/* Sliding ochre fill on hover */
.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--stone-ochre);
  transform: translateX(-100%);
  transition: transform .4s cubic-bezier(.16,1,.3,1);
}
.login-btn:hover::before,
.login-btn:focus-visible::before { transform: translateX(0); }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-btn:disabled::before { display: none; }

.login-btn-inner {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  gap: 12px;
}
.login-btn-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.login-btn-arrow {
  font-family: var(--font-mono);
  font-size: 16px;
  transition: transform .3s cubic-bezier(.16,1,.3,1);
  opacity: 0.6;
  line-height: 1;
}
.login-btn:hover .login-btn-arrow { transform: translateX(5px); opacity: 1; }

/* Loading state */
.login-loading {
  display: inline-block;
  width: 13px;
  height: 13px;
  border: 1.5px solid rgba(245,242,237,0.3);
  border-top-color: var(--stone-white);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── OAuth buttons ── */
.oauth-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
}
.oauth-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 13px 20px;
  background: #fff;
  border: 1px solid var(--border);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--stone-dark);
  letter-spacing: 0.02em;
  transition: border-color .2s, background .2s, color .2s;
  position: relative;
  overflow: hidden;
}
.oauth-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--stone-ochre);
  transform: translateX(-100%);
  transition: transform .35s cubic-bezier(.16,1,.3,1);
}
.oauth-btn:hover { border-color: var(--stone-ochre); color: #fff; }
.oauth-btn:hover::before { transform: translateX(0); }
.oauth-btn:hover .oauth-icon { filter: brightness(0) invert(1); }
.oauth-btn span { position: relative; z-index: 1; }
.oauth-icon {
  position: relative;
  z-index: 1;
  flex-shrink: 0;
  transition: filter .2s;
}

/* Divider & register */
.login-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 0 0 28px;
  color: var(--stone-sand);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.login-divider::before,
.login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.login-register {
  margin-top: 20px;
  text-align: center;
  font-size: 13px;
  color: var(--stone-grey);
}
.login-register a {
  color: var(--stone-ochre);
  font-weight: 500;
  border-bottom: 1px solid rgba(166,124,82,0.3);
  padding-bottom: 1px;
  transition: border-color .2s, color .2s;
}
.login-register a:hover {
  color: var(--stone-ochre-dk);
  border-bottom-color: var(--stone-ochre-dk);
}

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .login-shell { grid-template-columns: 1fr; }
  .login-brand { display: none; }
  .login-form-side { padding: 100px 32px 60px; }
  nav { padding: 14px 24px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 48" style="height:36px;width:auto;display:block;" aria-label="World Stone Hub">
    <text x="0" y="30" font-family="'Cormorant Garamond','Cormorant',Georgia,'Times New Roman',serif" font-weight="300" font-size="18" letter-spacing="6" fill="#1A1410">WORLD STONE</text>
    <line x1="208" y1="7" x2="208" y2="41" stroke="#A67C52" stroke-width="0.75" opacity="0.65"/>
    <text x="220" y="34" font-family="'Cormorant Garamond','Cormorant',Georgia,'Times New Roman',serif" font-weight="300" font-style="italic" font-size="30" letter-spacing="0.5" fill="#A67C52">Hub</text>
  </svg></a>
</nav>

<div class="login-shell">

  <!-- BRAND SIDE -->
  <div class="login-brand">
    <!-- Geometric mark (from brand book) -->
    <svg class="brand-geo" width="220" height="220" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="20,4 36,14 36,30 20,38 4,30 4,14" stroke="#EDE8DF" stroke-width="1.5" fill="none"/>
      <polygon points="20,10 30,16 30,28 20,34 10,28 10,16" stroke="#C9B99A" stroke-width="1" fill="none"/>
      <circle cx="20" cy="22" r="3" fill="#C9B99A"/>
    </svg>

    <p class="brand-quote">

    </p>
    <div class="brand-meta">
      <div class="brand-meta-item">
        Plataforma <span>World Stone Hub</span>
      </div>
      <div class="brand-meta-item">
        Acceso <span>Panel de empresa</span>
      </div>
    </div>
  </div>

  <!-- FORM SIDE -->
  <div class="login-form-side">
    <div class="login-card">

      <div class="login-eyebrow">Acceso privado</div>
      <h1 class="login-title">Bienvenido<br>de <em>vuelta</em></h1>
      <p class="login-desc">Accede con tu cuenta de Google o GitHub, o con tu email y contraseña.</p>

      <!-- OAuth -->
      <div class="oauth-group">
        <button class="oauth-btn" id="btnGoogle" type="button">
          <!-- Google "G" icon -->
          <svg class="oauth-icon" width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>

        <button class="oauth-btn" id="btnGithub" type="button">
          <!-- GitHub icon -->
          <svg class="oauth-icon" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>

        </button>
      </div>

      <div class="login-divider">o con email</div>

      <form class="login-form" id="loginForm" autocomplete="on">

          <label class="login-label" for="loginEmail">Email</label>
          <input type="email" class="login-input" id="loginEmail" placeholder="tu@email.com" autocomplete="email" required>

          <label class="login-label" for="loginPass">Contraseña</label>
          <input type="password" class="login-input" id="loginPass" placeholder="············" autocomplete="current-password" required>
        </div>
        <div class="login-feedback" id="loginFeedback"></div>
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="login-btn-inner">

          </span>

      <div class="login-register" style="margin-top:24px;">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SB_URL = "https://whcptmdapnavcxcszwwk.supabase.co";
  var SB_KEY = "sb_publishable_CsE_EOAwQSJgKDC2eEcBOA_UztVp7gO";
  var db = supabase.createClient(SB_URL, SB_KEY);

  // Si ya hay sesión activa, redirigir al panel
  db.auth.getSession().then(function(r){
    if(r.data && r.data.session){ window.location.href = 'panel.html'; }
  });

  function setFeedback(msg, type){
    var el = document.getElementById('loginFeedback');
    el.textContent = msg;
    el.className = 'login-feedback ' + (type || '');
  }

  function setLoading(loading){
    var btn = document.getElementById('loginBtn');
    if(loading){
      btn.disabled = true;
      btn.querySelector('.login-btn-inner').innerHTML =
        '<span class="login-loading"></span><span class="login-btn-label">Entrando…</span>';
    } else {
      btn.disabled = false;
      btn.querySelector('.login-btn-inner').innerHTML =
        '<span class="login-btn-label">Iniciar sesión</span><span class="login-btn-arrow">→</span>';
    }
  }

  // ── OAuth ────────────────────────────────────────────────────────────────
  var redirectTo = window.location.origin + '/panel.html';

  function oauthLoading(btn, label) {
    btn.disabled = true;
    btn.querySelector('span:last-child').textContent = label;
  }

  document.getElementById('btnGoogle').addEventListener('click', function(){
    oauthLoading(this, 'Conectando con Google…');
    db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: redirectTo } });
  });

  document.getElementById('btnGithub').addEventListener('click', function(){
    oauthLoading(this, 'Conectando con GitHub…');
    db.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: redirectTo } });
  });

  // ── Email / password ─────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var email = document.getElementById('loginEmail').value.trim();
    var pass  = document.getElementById('loginPass').value;
    if(!email || !pass){ setFeedback('Por favor, completa todos los campos.', 'err'); return; }
    setLoading(true);
    setFeedback('', '');
    db.auth.signInWithPassword({ email: email, password: pass }).then(function(res){
      if(res.error){
        setLoading(false);
        var msg = res.error.message;
        if(msg === 'Invalid login credentials') msg = 'Email o contraseña incorrectos.';
        else if(msg === 'Email not confirmed')  msg = 'Confirma tu email antes de iniciar sesión.';
        setFeedback(msg, 'err');
      } else {
        window.location.href = 'panel.html';
      }
    });
  });
})();
</script>
</body>
